<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tesouraria do Time</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
</head>
<body>

  <header class="topo">
    <h1>⚽ Tesouraria</h1>
  </header>

  <nav class="nav">
    <button data-aba="jogadores" class="aba ativa">👥 Jogadores</button>
    <button data-aba="caixa" class="aba">📦 Caixa</button>
  </nav>

  <main>
    <!-- ABA JOGADORES -->
    <section id="aba-jogadores" class="tela ativa">

      <div class="acoes-jogadores">
        <input type="text" class="inputNome" id="input-nome-jogador" placeholder="Nome do jogador">
        <button id="btn-adicionar-jogador">+ Jogador</button>
        <button id="btn-fechar-mes">Fechar Mês</button>
        <button id="btn-excluir-jogador" class="btn-config">
  Excluir Jogador
</button>
      </div>

      <table class="tabela">
  <thead>
    <tr>
      <th>Nome</th>
      <th>Status</th>
      <th>Valor</th>
      <th>Forma</th>
      <th>Ação</th>
    </tr>
  </thead>
  <tbody id="lista-jogadores">
    <!-- JS preenche aqui -->
  </tbody>
</table>

    </section>

    <!-- ABA CAIXA -->
    <section id="aba-caixa" class="tela">

      <div class="resumo-caixa">
        <h2>Saldo em Caixa</h2>
        <p>R$ <span id="total-geral">0.00</span></p>
      </div>
      <div class="sub-totais">
        <p>Pix: R$ <span id="total-pix">0.00</span></p>
        <p>Dinheiro: R$ <span id="total-dinheiro">0.00</span></p>
      </div>

      <div class="acoes-caixa">
        <button id="btn-entrada">Entrada +</button>
        <button id="btn-saida">- Saída</button>
      </div>

      <ul id="lista-movimentacoes" class="lista">
        <!-- Histórico financeiro -->
      </ul>

    </section>
  </main>

  <div id="modal-caixa" class="modal">
  <div class="modal-conteudo">
    <h3 id="modal-titulo">Nova Movimentação</h3>

    <input type="number" id="modal-valor" placeholder="Valor" step="0.01">
    <input type="text" id="modal-descricao" placeholder="Descrição">

    <div class="modal-botoes">
      <button id="modal-cancelar">Cancelar</button>
      <button id="modal-confirmar">Confirmar</button>
    </div>
  </div>
</div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
